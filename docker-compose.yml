services:
  db:
    image: postgres:15-alpine
    container_name: resolveai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resolveai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: resolveai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/app/knowledge_base
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resolveai
    depends_on:
      db:
        condition: service_healthy
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: resolveai-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: